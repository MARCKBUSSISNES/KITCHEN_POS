<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de Órdenes</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tables.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      margin:0;
      padding:0;
      background:#080d17;
    }

    .kds-shell{
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      padding:12px 14px;
      box-sizing:border-box;
      background:
        radial-gradient(circle at top right, rgba(249,115,22,.12), transparent 32%),
        radial-gradient(circle at bottom left, rgba(34,197,94,.08), transparent 28%),
        #080d17;
    }

    #visorApp{
      min-height:0;
      flex:1;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .kds-topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 0 10px;
    }

    .kds-filters{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin:0;
    }

    .kds-filter{
      padding:12px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      background:#334155;
      color:white;
      font-weight:900;
      font-size:16px;
      box-shadow:0 8px 18px rgba(0,0,0,.22);
    }

    .kds-filter.active{
      background:linear-gradient(135deg,#22c55e,#86efac);
      color:#052e16;
      border-color:rgba(134,239,172,.5);
    }

    .kds-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin:0;
    }

    .kds-action-btn{
      border:none;
      border-radius:16px;
      padding:13px 18px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:#334155;
      box-shadow:0 8px 18px rgba(0,0,0,.25);
    }

    .kds-action-btn.refresh{background:#334155;}
    .kds-action-btn.close{background:linear-gradient(135deg,#dc2626,#ef4444);}

    .kds-stage{
      position:relative;
      min-height:0;
      flex:1;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      background:rgba(15,23,42,.58);
      box-shadow:0 16px 32px rgba(0,0,0,.28);
    }

    .kds-grid{
      height:100%;
      width:100%;
      display:flex;
      flex-wrap:nowrap;
      gap:18px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:18px 72px 18px 72px;
      box-sizing:border-box;
      scroll-behavior:auto;
      scrollbar-width:thin;
      scrollbar-color:#f97316 #111827;
    }

    .kds-grid::-webkit-scrollbar{height:16px;}
    .kds-grid::-webkit-scrollbar-track{background:#111827;border-radius:999px;}
    .kds-grid::-webkit-scrollbar-thumb{background:#f97316;border-radius:999px;}

    .kds-card{
      flex:0 0 clamp(440px, 32vw, 600px);
      height:100%;
      display:flex;
      flex-direction:column;
      padding:18px;
      border-radius:22px;
      border:1px solid rgba(249,115,22,.22);
      background:linear-gradient(180deg,#111827,#0b1220);
      box-shadow:0 14px 28px rgba(0,0,0,.35);
      box-sizing:border-box;
      overflow:hidden;
    }

    .kds-card.late{border-color:#ef4444;box-shadow:0 0 0 1px rgba(239,68,68,.35),0 14px 28px rgba(0,0,0,.35);}

    .kds-order-banner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      border-radius:18px;
      margin-bottom:16px;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .kds-order-banner.mesa{
      background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(20,83,45,.52));
      border-color:rgba(34,197,94,.38);
    }

    .kds-order-banner.llevar{
      background:linear-gradient(135deg,rgba(249,115,22,.36),rgba(120,53,15,.52));
      border-color:rgba(249,115,22,.42);
    }

    .kds-order-banner.domicilio{
      background:linear-gradient(135deg,rgba(56,189,248,.30),rgba(30,64,175,.50));
      border-color:rgba(56,189,248,.42);
    }

    .kds-order-type{
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:15px;
      font-weight:1000;
      color:#fff7ed;
      text-shadow:0 2px 4px rgba(0,0,0,.35);
    }

    .kds-order-area{
      margin-top:5px;
      font-size:18px;
      font-weight:900;
      color:#bbf7d0;
      text-shadow:0 2px 4px rgba(0,0,0,.35);
    }

    .kds-order-number{
      font-size:42px;
      line-height:1;
      font-weight:1000;
      color:#fff;
      text-shadow:0 3px 6px rgba(0,0,0,.45);
      word-break:break-word;
    }

    .kds-time{
      flex:0 0 auto;
      min-width:96px;
      text-align:center;
      font-size:27px;
      font-weight:1000;
      color:#111827;
      background:linear-gradient(135deg,#facc15,#fde047);
      border-radius:14px;
      padding:12px 10px;
      box-shadow:0 8px 16px rgba(0,0,0,.25);
    }

    .kds-title{
      font-size:30px;
      line-height:1.05;
      font-weight:1000;
      color:#fff;
      margin-bottom:4px;
    }

    .kds-origin{
      color:#d6c6b6;
      font-size:14px;
      margin-bottom:12px;
    }

    .kds-meta{
      flex:0 0 auto;
      display:grid;
      gap:5px;
      color:#d6c6b6;
      font-size:14px;
      margin-bottom:14px;
    }

    .kds-items{
      min-height:0;
      flex:1;
      overflow-y:auto;
      display:grid;
      align-content:start;
      gap:12px;
      padding-right:4px;
      margin-bottom:14px;
    }

    .kds-item{
      padding:14px 14px;
      border-radius:16px;
      background:#070d19;
      border:1px solid rgba(249,115,22,.25);
    }

    .kds-item strong{
      display:block;
      font-size:23px;
      color:#fff;
      line-height:1.15;
      margin-bottom:8px;
    }

    .kds-note{
      margin-top:6px;
      color:#fcd34d;
      font-size:15px;
      font-weight:800;
    }

    .kds-item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .kds-small-btn{
      border:none;
      border-radius:12px;
      padding:9px 12px;
      cursor:pointer;
      color:white;
      background:#334155;
      font-weight:900;
      font-size:14px;
    }

    .kds-small-btn.danger{background:#ef4444;}

    .kds-deliver-btn{
      flex:0 0 auto;
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px 18px;
      font-size:17px;
      font-weight:1000;
      color:#052e16;
      background:linear-gradient(135deg,#22c55e,#86efac);
      cursor:pointer;
    }

    .kds-scroll-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:10;
      width:54px;
      height:96px;
      border:none;
      border-radius:18px;
      display:grid;
      place-items:center;
      cursor:pointer;
      font-size:42px;
      font-weight:1000;
      color:white;
      background:rgba(15,23,42,.86);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 12px 26px rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
    }

    .kds-scroll-arrow:hover{background:rgba(249,115,22,.88);}
    .kds-scroll-arrow.left{left:10px;}
    .kds-scroll-arrow.right{right:10px;}

    .kds-empty{
      min-width:520px;
      height:100%;
      display:grid;
      place-items:center;
      padding:28px;
      border-radius:20px;
      border:1px dashed rgba(255,255,255,.14);
      color:#d6c6b6;
      font-size:22px;
      font-weight:900;
      background:rgba(15,23,42,.62);
    }

    @media (max-width:900px){
      .kds-card{flex-basis:86vw;}
      .kds-order-area{font-size:15px;}
      .kds-order-number{font-size:34px;}
      .kds-title{font-size:25px;}
      .kds-grid{padding-left:64px;padding-right:64px;}
    }
  </style>
</head>

<body>
  <div class="kds-shell">
    <div id="visorApp"></div>
  </div>

  <script src="js/core/utils.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/db.js"></script>
  <script src="js/core/settings.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="data/seed.js"></script>
  <script src="js/views/visor.view.js"></script>

  <script>
    window.addEventListener("load", async () => {
      await AppDB.init();
      await seedApp();
      renderVisorOrdenes();

      setInterval(() => {
        if (window.KDSUI && typeof KDSUI.saveScrollState === "function") {
          KDSUI.saveScrollState();
        }

        AppDB.init().then(() => {
          renderVisorOrdenes();
        });
      }, 1500);
    });
  </script>
</body>
</html>
